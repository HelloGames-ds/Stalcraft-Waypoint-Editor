name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Show build inputs
        run: |
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"
          Get-ChildItem .
          Get-ChildItem .\assets -Recurse | Select-Object -First 20 FullName
          Get-Content .\simplemapper_runtime.spec

      - name: Build onefile EXE
        run: |
          pyinstaller --clean --noconfirm --log-level DEBUG simplemapper_runtime.spec *>&1 | Tee-Object -FilePath pyinstaller-build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pyinstaller-build-log
          path: pyinstaller-build.log
          if-no-files-found: warn

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: Stalcraft-Waypoint-Editor-windows
          path: dist/Stalcraft-Waypoint-Editor.exe
          if-no-files-found: error

      - name: Attach EXE to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "$env:GITHUB_REF_NAME"
          $asset = "dist/Stalcraft-Waypoint-Editor.exe"
          $notes = "Automated Windows one-file build."

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $asset --title $tag --notes $notes
          }
          else {
            gh release upload $tag $asset --clobber
          }
